version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PWD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ainetwork

  rabbitmq:
    image: rabbitmq:3.8-management-alpine
    container_name: rabbitmq_broker
    ports:
      - "5672:5672"   # AMQP protocol port
      - "25672:15672"  # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ainetwork

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:latest
    container_name: weaviate_db
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
      # --- THIS IS THE CRITICAL LINE YOU MUST ADD ---
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama'
    networks:
      - ainetwork
    # --- ADD THIS TO ENSURE OLLAMA STARTS FIRST ---
    depends_on:
      - ollama

  # --- THIS IS THE NEW SERVICE YOU MUST ADD ---
  ollama:
    image: ollama/ollama
    container_name: ollama_service
    hostname: ollama  # This is critical for your 'http://ollama:11434' URL
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434" # Good to expose for debugging
    networks:
      - ainetwork

volumes:
  postgres_data:
  rabbitmq_data:
  weaviate_data:
  ollama_data:  # <-- ADD THIS VOLUME

networks:
  ainetwork:
    driver: bridge